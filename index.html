<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <canvas id="webgl"></canvas>

  <div id="scroll-container">
    <div class="scroll-spacer"></div>
  </div>

  <div id="scroll-hint">
    <span>SCROLL TO EXPLORE</span>
    <div class="arrow"></div>
  </div>

  <!-- Visual Novel overlay -->
  <div id="vn-overlay" class="overlay" style="display:none">
    <img id="vn-sprite" class="vn-sprite" src="/character/wave.png" alt="Ethan" />
    <video id="vn-talking" class="vn-sprite" src="/character/talking.webm" loop muted playsinline style="display:none"></video>
    <div class="vn-dialogue">
      <span class="vn-name">Ethan</span>
      <p id="vn-text" class="vn-text"></p>
    </div>
    <div id="vn-choices" class="vn-choices" style="display:none">
      <button class="vn-choice" data-action="work">View my work</button>
      <button class="vn-choice" data-action="explore">Explore the room</button>
      <button class="vn-choice" data-action="chat">Chat with me</button>
    </div>
  </div>

  <!-- Computer overlay -->
  <div id="computer-overlay" class="overlay overlay-minimal" style="display:none">
    <button id="btn-back-computer" class="back-btn">&larr; Back to menu</button>
  </div>

  <!-- Explore mode overlay -->
  <div id="explore-overlay" class="overlay overlay-minimal" style="display:none">
    <button id="btn-back-explore" class="back-btn">&larr; Back to menu</button>
    <div id="tooltip" class="tooltip"></div>
  </div>

  <!-- Chat overlay -->
  <div id="chat-overlay" class="overlay" style="display:none">
    <div class="chat-panel">
      <div class="chat-header">
        <span>Chat with Ethan</span>
        <button id="btn-close-chat" class="close-btn">&times;</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-area">
        <input id="chat-input" type="text" placeholder="Ask me anything..." />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
